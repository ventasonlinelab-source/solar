<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDITORÍA SISTÉMICA SOLAR 10X²</title>
    <style>
        :root { --red: #dc2626; --bg: #000; --card: #18181b; --green: #10b981; }
        body { background-color: var(--bg); color: #fff; font-family: system-ui, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; width: 100%; }
        
        .badge { background: var(--red); color: #fff; padding: 6px 14px; font-weight: 900; text-transform: uppercase; font-size: 11px; letter-spacing: 1.5px; border-radius: 2px; display: inline-block; margin-bottom: 20px; }
        h1 { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; margin-bottom: 25px; letter-spacing: -1px; line-height: 1.1; }
        
        .card { background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid #333; text-align: left; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        
        label { font-size: 10px; color: #a1a1aa; text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 8px; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 14px; background: #09090b; border: 1px solid #3f3f46; color: #fff; border-radius: 4px; font-size: 15px; box-sizing: border-box; margin-bottom: 15px; }
        
        .btn-main { background: var(--red); color: #fff; border: none; padding: 20px; width: 100%; font-weight: 900; text-transform: uppercase; border-radius: 4px; cursor: pointer; font-size: 15px; letter-spacing: 1px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }

        .gdpr { display: flex; align-items: flex-start; gap: 10px; font-size: 11px; margin-bottom: 15px; color: #a1a1aa; line-height: 1.4; }
        .gdpr input { width: auto; margin-top: 3px; }

        .report-box { background: #fff; color: #000; padding: 25px; border-radius: 10px; border-left: 10px solid var(--red); margin-bottom: 15px; text-align: left; }
        .report-box.secure { border-left-color: var(--green); background: #f0fdf4; }
        .big-num { font-size: 36px; font-weight: 900; letter-spacing: -1.5px; margin: 5px 0; color: var(--red); line-height: 1; }
        .secure .big-num { color: var(--green); }
        
        .tech-sentence { border-top: 1px solid rgba(0,0,0,0.1); margin-top: 12px; padding-top: 12px; }
        .tech-list { margin: 0; padding: 0; list-style: none; font-size: 12px; font-weight: 700; color: #333; }
        .tech-list li { margin-bottom: 6px; padding-left: 20px; position: relative; line-height: 1.3; }
        .tech-list li::before { content: "×"; color: var(--red); position: absolute; left: 0; font-weight: 900; }
        .secure .tech-list li::before { content: "✓"; color: var(--green); }

        .hidden { display: none; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: var(--red); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="main-view" class="container">
    <div class="badge">Auditoría 10X²</div>
    <h1>BLINDA TU INSTALADORA ANTE <br><span style="color:var(--red);">AEAT Y FUGAS COMERCIALES</span></h1>
    
    <div class="card">
        <div id="fields">

            <label>Responsable</label>
            <input type="text" id="name" placeholder="Tu nombre" required>

            <label>WhatsApp Directo (Llamada de diagnóstico)</label>
            <input type="tel" id="phone" placeholder="+34..." required>

            <label>Volumen Anual</label>
            <select id="fact">
                <option value="400000">100k - 500k €</option>
                <option value="800000">500k - 1M €</option>
                <option value="2000000">+1M €</option>
            </select>

            <label>¿Certificación Verifactu?</label>
            <select id="verifactu">
                <option value="no">No / Lo desconozco</option>
                <option value="si">Sí, sistema certificado</option>
            </select>

            <label>Gestión de nuevos Leads</label>
            <select id="tipo">
                <option value="humano">Manual (Llamada comercial diferida)</option>
                <option value="ninguna">Sin protocolo de respuesta rápida</option>
            </select>

            <label>Cualificación Financiera</label>
            <select id="cuali">
                <option value="humano_caro">Equipo humano (Filtro manual)</option>
                <option value="nadie">Sin filtrado técnico previo</option>
            </select>

            <!-- GDPR SIN LINK -->
            <div class="gdpr">
                <input type="checkbox" id="gdpr">
                <label for="gdpr">
                    Acepto el tratamiento de mis datos para recibir una llamada de diagnóstico y la gestión de mi solicitud conforme a la normativa vigente.
                </label>
            </div>

            <button class="btn-main" onclick="run()">GENERAR SENTENCIA TÉCNICA</button>
        </div>
        
        <div id="loading" class="hidden" style="text-align: center; padding: 40px 0;">
            <div class="spinner"></div>
            <p style="font-weight:900; font-size:12px; text-transform:uppercase;">Detectando hemorragias operativas...</p>
        </div>
    </div>
</div>

<script>
let data = {};

function run() {

    if(!document.getElementById('gdpr').checked){
        return alert("Debes aceptar el tratamiento de datos.");
    }

    if(!document.getElementById('name').value || !document.getElementById('phone').value){
        return alert("Cesar, rellena los datos.");
    }

    data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value
    };

    fetch('https://n8n.planneruniversedigital.com/webhook/539d7879-37ff-47a1-a64e-6186a94aa0f8', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    alert("Enviado correctamente");
}
</script>

</body>
</html>
